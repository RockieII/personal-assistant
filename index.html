<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#5C6BC0">
  <!-- Makes it feel like a native app when installed -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Personal Assistant</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <div id="app">

    <!-- Top header: title + prev/next navigation -->
    <header id="header">
      <button id="prev-btn" class="header-btn">&#8249;</button>
      <h1 id="header-title">Calendar</h1>
      <button id="next-btn" class="header-btn">&#8250;</button>
    </header>

    <!-- View mode tabs (Month / Week / Agenda) — only shown in Calendar nav -->
    <div id="view-tabs" class="hidden">
      <button class="tab active" data-view="month">Month</button>
      <button class="tab" data-view="week">Week</button>
      <button class="tab" data-view="agenda">Agenda</button>
    </div>

    <!-- Main scrollable content area — views are rendered here -->
    <main id="main-view"></main>

    <!-- Bottom navigation bar -->
    <nav id="bottom-nav">
      <button class="nav-item active" data-nav="calendar">
        <span class="nav-icon">&#128197;</span>
        <span class="nav-label">Calendar</span>
      </button>
      <button class="nav-item" data-nav="agenda">
        <span class="nav-icon">&#128203;</span>
        <span class="nav-label">Agenda</span>
      </button>
      <button class="nav-item" data-nav="settings">
        <span class="nav-icon">&#9881;</span>
        <span class="nav-label">Settings</span>
      </button>
    </nav>

    <!-- Floating action button: opens the new event form -->
    <button id="fab" aria-label="Add event">+</button>

    <!-- Event form modal (slides up from bottom) -->
    <div id="modal-overlay" class="hidden">
      <div id="event-modal">
        <div class="modal-header">
          <h2 id="modal-title">New Event</h2>
          <button id="modal-close" aria-label="Close">&#10005;</button>
        </div>
        <!-- Form content is built dynamically by app.js -->
        <form id="event-form"></form>
      </div>
    </div>

  </div>

  <!-- Scripts loaded in dependency order -->
  <script src="js/db.js"></script>
  <script src="js/event-types.js"></script>
  <script src="js/events.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
